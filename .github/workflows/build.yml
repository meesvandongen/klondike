name: Build Desktop

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.game }} (${{ matrix.platform }})
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest]
        game: [klondike, freecell, spider, tripeaks, pyramid]
        include:
          - platform: macos-latest
            target_args: "--target universal-apple-darwin"
            artifact_glob: "src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg"
          - platform: windows-latest
            target_args: ""
            artifact_glob: "src-tauri/target/release/bundle/nsis/*.exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri
          shared-key: ${{ matrix.platform }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install npm dependencies
        run: npm install

      - name: Build ${{ matrix.game }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx tauri build --config tauri.${{ matrix.game }}.conf.json ${{ matrix.target_args }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: solitaire-${{ matrix.game }}-${{ matrix.platform }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*.dmg
            dist/**/*.exe
          generate_release_notes: true
